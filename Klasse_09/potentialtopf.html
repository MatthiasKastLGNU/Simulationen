		:root {
			--blue-frame:  #0000BF;
			--blue-title:  #F2F2FF;
			--red-frame:   #BF0000;
			--red-title:   #FFF2F2;
			--green-frame: #295C06;
			--green-title: #F5FAF3;
			--text: #111;
		}
		* { box-sizing: border-box; }
		body {
			margin: 0;
			padding: 1rem 0.6rem 2.5rem;
			background: #E8E8E8;
			font-family: 'Libertinus Serif', Georgia, serif;
			font-size: 16px;
			line-height: 1.45;
			color: var(--text);
		}
		.blatt {
			max-width: 780px;
			margin: 0 auto;
			background: #fff;
			padding: 1.6rem 1.8rem 2rem;
			box-shadow: 0 1px 6px rgba(0,0,0,0.25);
		}
		.kopf {
			display: flex;
			justify-content: space-between;
			align-items: baseline;
			flex-wrap: wrap;
			gap: 0.2rem 1rem;
			border-bottom: 1.5px solid var(--text);
			padding-bottom: 0.3rem;
			margin-bottom: 1.1rem;
		}
		.kopf .titel { font-weight: bold; font-size: 1.25rem; }
		.kopf .klasse { font-size: 0.95rem; }

		.tcb { border: 1.5px solid; border-radius: 7px; margin: 1.1rem 0; overflow: hidden; background: #fff; }
		.tcb > .tcb-title { font-weight: bold; padding: 0.32rem 0.75rem; border-bottom: 1.5px solid; }
		.tcb > .tcb-body { padding: 0.65rem 0.75rem 0.8rem; }
		.tcb.blau  { border-color: var(--blue-frame); }
		.tcb.blau  > .tcb-title { color: var(--blue-frame);  background: var(--blue-title);  border-color: var(--blue-frame); }
		.tcb.rot   { border-color: var(--red-frame); }
		.tcb.rot   > .tcb-title { color: var(--red-frame);   background: var(--red-title);   border-color: var(--red-frame); }
		.tcb.gruen { border-color: var(--green-frame); }
		.tcb.gruen > .tcb-title { color: var(--green-frame); background: var(--green-title); border-color: var(--green-frame); }

		i.gr { font-family: 'Libertinus Serif', Georgia, serif; }
		sub, sup { font-size: 0.72em; }


		#sim-canvas { display: block; width: 100%; height: auto; touch-action: manipulation; }

		.steuerung { display: flex; flex-direction: column; gap: 0.55rem; margin-top: 0.6rem; font-size: 0.95rem; }
		.zeile { display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; }
		.zeile > label { min-width: 8.5em; }
		input[type="range"] { flex: 1; min-width: 140px; accent-color: var(--blue-frame); }
		.wert { font-variant-numeric: tabular-nums; min-width: 4.8em; text-align: right; }

		.knopfleiste { display: flex; gap: 0.35rem; flex-wrap: wrap; }
		.knopfleiste button {
			font: inherit;
			font-size: 0.95rem;
			min-width: 2.3em;
			padding: 0.28rem 0.6rem;
			border: 1.5px solid var(--blue-frame);
			border-radius: 5px;
			background: #fff;
			color: var(--blue-frame);
			cursor: pointer;
		}
		.knopfleiste button.aktiv { background: var(--blue-frame); color: #fff; }
		.knopfleiste button:hover:not(.aktiv) { background: var(--blue-title); }


		@media (max-width: 560px) {
			.blatt { padding: 1rem 0.8rem 1.4rem; }
			.zeile > label { min-width: 0; }
		}
	</style>
</head>
<body>
<div class="blatt">

	<div class="kopf">
		<span class="titel">Der eindimensionale Potentialtopf</span>
		<span class="klasse">Physik 13 &middot; Quantenphysik</span>
	</div>

	<div class="tcb blau">
		<div class="tcb-title">Simulation: Zust&auml;nde im unendlich hohen Potentialtopf</div>
		<div class="tcb-body">
			<canvas id="sim-canvas"></canvas>
			<div class="steuerung">
				<div class="zeile">
					<label>Quantenzahl <i class="gr">n</i></label>
					<span class="knopfleiste" id="n-knoepfe"></span>
				</div>
				<div class="zeile">
					<label for="slider-L">Topfbreite <i class="gr">L</i></label>
					<input type="range" id="slider-L" min="0.2" max="2.0" step="0.01" value="1.0">
					<span class="wert" id="wert-L">1,00&nbsp;nm</span>
				</div>
				<div class="zeile">
					<label>Darstellung</label>
					<span class="knopfleiste">
						<button id="btn-psi" class="aktiv"><i class="gr">&psi;</i>(<i class="gr">x</i>)</button>
						<button id="btn-psi2">|<i class="gr">&psi;</i>(<i class="gr">x</i>)|<sup>2</sup></button>
						<button id="btn-zeit">Re&nbsp;<i class="gr">&Psi;</i>(<i class="gr">x</i>,<i class="gr">t</i>) animieren</button>
					</span>
				</div>
			</div>
		</div>
	</div>

</div>

<script>
	"use strict";

	const h  = 6.62607015e-34;
	const me = 9.1093837015e-31;
	const eV = 1.602176634e-19;
	const N_MAX = 6;

	const zustand = { L_nm: 1.0, n: 1, dichte: false, animiert: false, t: 0 };

	function E_n(n, L_nm) {
		const L = L_nm * 1e-9;
		return (h * h * n * n) / (8 * me * L * L) / eV;
	}

	/* ---- Bedienelemente ---- */
	const nLeiste = document.getElementById("n-knoepfe");
	for (let n = 1; n <= N_MAX; n++) {
		const b = document.createElement("button");
		b.className = n === 1 ? "aktiv" : "";
		b.textContent = n;
		b.addEventListener("click", () => {
			zustand.n = n;
			nLeiste.querySelectorAll("button").forEach(x => x.classList.toggle("aktiv", +x.textContent === n));
			zeichne();
		});
		nLeiste.appendChild(b);
	}

	const sliderL = document.getElementById("slider-L");
	sliderL.addEventListener("input", () => {
		zustand.L_nm = parseFloat(sliderL.value);
		document.getElementById("wert-L").textContent = zustand.L_nm.toFixed(2).replace(".", ",") + "\u00A0nm";
		zeichne();
	});

	const btnPsi  = document.getElementById("btn-psi");
	const btnPsi2 = document.getElementById("btn-psi2");
	const btnZeit = document.getElementById("btn-zeit");
	btnPsi.addEventListener("click", () => { zustand.dichte = false; btnPsi.classList.add("aktiv"); btnPsi2.classList.remove("aktiv"); zeichne(); });
	btnPsi2.addEventListener("click", () => { zustand.dichte = true; btnPsi2.classList.add("aktiv"); btnPsi.classList.remove("aktiv"); zeichne(); });
	btnZeit.addEventListener("click", () => {
		zustand.animiert = !zustand.animiert;
		btnZeit.classList.toggle("aktiv", zustand.animiert);
		if (zustand.animiert) requestAnimationFrame(schleife); else zeichne();
	});

	/* ---- Canvas ---- */
	const canvas = document.getElementById("sim-canvas");
	const ctx = canvas.getContext("2d");
	let W = 680, H = 440;

	function skaliere() {
		const dpr = window.devicePixelRatio || 1;
		W = canvas.clientWidth || canvas.parentElement.clientWidth || 680;
		H = Math.max(320, Math.min(480, Math.round(W * 0.66)));
		canvas.style.height = H + "px";
		canvas.width  = Math.round(W * dpr);
		canvas.height = Math.round(H * dpr);
		ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
	}

	/* Auswahl von n auch durch Antippen der Niveaus im Bild */
	const niveauZonen = [];
	canvas.addEventListener("click", ev => {
		const r = canvas.getBoundingClientRect();
		const y = ev.clientY - r.top;
		for (const z of niveauZonen) {
			if (Math.abs(y - z.y) < 12) {
				zustand.n = z.n;
				nLeiste.querySelectorAll("button").forEach(x => x.classList.toggle("aktiv", +x.textContent === z.n));
				zeichne();
				return;
			}
		}
	});

	function zeichne() {
		ctx.clearRect(0, 0, W, H);
		const eng = W < 480;

		const rand = { l: eng ? 44 : 60, r: eng ? 44 : 62, o: 24, u: 34 };
		const topfL = rand.l + (eng ? 12 : 26);
		const topfR = W - rand.r - (eng ? 12 : 26);
		const boden = H - rand.u;
		const decke = rand.o;

		const Emax = E_n(N_MAX, zustand.L_nm);
		const yVonE = E => boden - (E / Emax) * (boden - decke) * 0.90;

		/* Energieachse mit Pfeil */
		ctx.strokeStyle = "#111";
		ctx.lineWidth = 1.2;
		ctx.beginPath();
		ctx.moveTo(rand.l - 26, boden);
		ctx.lineTo(rand.l - 26, decke - 4);
		ctx.stroke();
		ctx.beginPath();
		ctx.moveTo(rand.l - 26, decke - 10);
		ctx.lineTo(rand.l - 30.5, decke + 1);
		ctx.lineTo(rand.l - 26, decke - 2);
		ctx.lineTo(rand.l - 21.5, decke + 1);
		ctx.closePath();
		ctx.fillStyle = "#111";
		ctx.fill();
		ctx.font = "italic 15px 'Libertinus Serif', Georgia, serif";
		ctx.fillText("E", rand.l - 20, decke + 6);
		ctx.font = "12px 'Libertinus Serif', Georgia, serif";
		ctx.fillText("in eV", rand.l - 20, decke + 21);

		/* Topf */
		ctx.strokeStyle = "#111";
		ctx.lineWidth = 2.5;
		ctx.beginPath();
		ctx.moveTo(topfL, decke); ctx.lineTo(topfL, boden);
		ctx.moveTo(topfR, decke); ctx.lineTo(topfR, boden);
		ctx.moveTo(topfL, boden); ctx.lineTo(topfR, boden);
		ctx.stroke();
		ctx.lineWidth = 1;
		ctx.strokeStyle = "#777";
		for (let y = decke + 6; y < boden - 4; y += 11) {
			ctx.beginPath();
			ctx.moveTo(topfL, y); ctx.lineTo(topfL - 8, y + 8);
			ctx.moveTo(topfR + 8, y); ctx.lineTo(topfR, y + 8);
			ctx.stroke();
		}
		ctx.fillStyle = "#111";
		ctx.font = "13px 'Libertinus Serif', Georgia, serif";
		ctx.fillText("0", topfL - 4, boden + 16);
		ctx.font = "italic 13px 'Libertinus Serif', Georgia, serif";
		ctx.fillText("L", topfR - 4, boden + 16);
		ctx.fillText("x", Math.min(topfR + 22, W - 12), boden + 16);

		/* Niveaus */
		niveauZonen.length = 0;
		for (let n = 1; n <= N_MAX; n++) {
			const E = E_n(n, zustand.L_nm);
			const y0 = yVonE(E);
			const aktiv = (n === zustand.n);
			niveauZonen.push({ n, y: y0 });

			ctx.strokeStyle = aktiv ? "#0000BF" : "#AAAAAA";
			ctx.lineWidth = aktiv ? 1.8 : 1.1;
			ctx.setLineDash(aktiv ? [] : [5, 4]);
			ctx.beginPath();
			ctx.moveTo(topfL, y0);
			ctx.lineTo(topfR, y0);
			ctx.stroke();
			ctx.setLineDash([]);

			ctx.fillStyle = aktiv ? "#0000BF" : "#888";
			ctx.font = (aktiv ? "bold " : "") + "12.5px 'Libertinus Serif', Georgia, serif";
			ctx.fillText(eng ? String(n) : "n = " + n, topfR + 10, y0 + 4);
			ctx.textAlign = "right";
			ctx.fillText(E.toFixed(E >= 10 ? 1 : 2).replace(".", ","), rand.l + (eng ? 8 : 22), y0 + 4);
			ctx.textAlign = "left";
		}

		/* Kurve des gewaehlten Zustands */
		const n = zustand.n;
		const y0 = yVonE(E_n(n, zustand.L_nm));
		const amp = Math.min(44, (boden - decke) / 7.5);
		const phase = zustand.animiert ? Math.cos(zustand.t * (0.9 + 0.55 * n)) : 1;

		ctx.strokeStyle = "#BF0000";
		ctx.lineWidth = 2.2;
		ctx.beginPath();
		const punkte = 300;
		for (let i = 0; i <= punkte; i++) {
			const xi = i / punkte;
			const s = Math.sin(n * Math.PI * xi);
			const wert = zustand.dichte ? s * s : s * phase;
			const px = topfL + xi * (topfR - topfL);
			const py = y0 - wert * amp;
			if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
		}
		ctx.stroke();
	}

	function schleife(zeit) {
		if (!zustand.animiert) return;
		zustand.t = zeit / 1000 * 2 * Math.PI * 0.35;
		zeichne();
		requestAnimationFrame(schleife);
	}

	window.addEventListener("resize", () => { skaliere(); zeichne(); });
	skaliere();
	zeichne();
	if (document.fonts && document.fonts.ready) document.fonts.ready.then(() => zeichne());
</script>
</body>
</html>
